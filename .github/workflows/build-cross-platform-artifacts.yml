name: Build Cross-Platform Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-installers
            tauri_bundles: "msi,nsis"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/msi/*.msi
              orchestrator-desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            artifact_name: linux-installers
            tauri_bundles: "deb,appimage"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/deb/*.deb
              orchestrator-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            artifact_name: mac-installers
            tauri_bundles: "dmg"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orchestrator-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build orchestrator-core jar
        run: mvn -q -DskipTests clean package
        working-directory: orchestrator-core

      - name: Copy jar into Tauri resources
        shell: bash
        run: cp orchestrator-core/target/orchestrator-core-standalone.jar orchestrator-desktop/src-tauri/orchestrator-core-standalone.jar

      - name: Install desktop dependencies
        run: npm ci
        working-directory: orchestrator-desktop

      - name: Build desktop frontend assets
        run: npm run build
        working-directory: orchestrator-desktop

      - name: Build Tauri bundles
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            npm run tauri:build -- --bundles ${{ matrix.tauri_bundles }} || {
              echo "Primeira tentativa falhou no macOS. Nova tentativa..."
              sleep 5
              npm run tauri:build -- --bundles ${{ matrix.tauri_bundles }}
            }
          else
            npm run tauri:build -- --bundles ${{ matrix.tauri_bundles }}
          fi
        working-directory: orchestrator-desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_glob }}
      - name: Publish release install scripts
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install/install.sh
            scripts/install/install.ps1
