name: Build Cross-Platform Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-installers
            tauri_bundles: "msi,nsis"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/msi/*.msi
              orchestrator-desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            artifact_name: linux-installers
            tauri_bundles: "deb,appimage"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/deb/*.deb
              orchestrator-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            artifact_name: mac-installers
            tauri_bundles: "dmg"
            artifact_glob: |
              orchestrator-desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orchestrator-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build orchestrator-core jar
        run: mvn -q -DskipTests clean package
        working-directory: orchestrator-core

      - name: Copy jar into Tauri resources
        shell: bash
        run: cp orchestrator-core/target/orchestrator-core-standalone.jar orchestrator-desktop/src-tauri/orchestrator-core-standalone.jar

      - name: Install desktop dependencies
        run: npm ci
        working-directory: orchestrator-desktop

      - name: Build Tauri bundles
        run: npm run tauri:build -- --bundles ${{ matrix.tauri_bundles }}
        working-directory: orchestrator-desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/**/*.msi
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.deb
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.dmg
